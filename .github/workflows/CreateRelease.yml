name: Create Release

on:
  push:
    tags:
      - v2*
  workflow_dispatch:
    inputs:
      releaseName:
        description: 'Release Name'
        required: true
      releaseDescription:
        description: 'Description'
        required: false
        type: string

jobs:
  create-release:
    runs-on: ubuntu-latest

    steps:
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # This token is provided by Actions, you do not need to create your own token
        with:
          tag_name: Alpha4Works
          release_name: Alpha4
          body: 'ModPlug Player 2 Alpha 4 release'
          draft: false
          prerelease: false
